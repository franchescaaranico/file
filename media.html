<script>
    function filterMovies() {
        const movies = document.querySelectorAll('.movie');
        const categoryLinks = document.querySelectorAll('.nav.category-nav a');

        const selectedCategory =
            Array.from(categoryLinks)
                .find(link => link.classList.contains('active'))
                ?.getAttribute('onclick')
                .match(/'([^']+)'/)[1] || 'all';

        movies.forEach(movie => {
            const matchesCategory =
                (selectedCategory === 'all' || movie.dataset.category === selectedCategory);

            movie.style.display = matchesCategory ? 'block' : 'none';
        });
    }

    function filterByCategory(category, element) {
        const categoryLinks = document.querySelectorAll('.nav.category-nav a');

        categoryLinks.forEach(link => link.classList.remove('active'));
        element.classList.add('active');

        filterMovies();
    }

    function showReview(movie) {
        movie.querySelector('.review').style.display = 'block';
    }

    function hideReview(movie) {
        movie.querySelector('.review').style.display = 'none';
    }
</script>
