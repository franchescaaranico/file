<title>moodboard</title><link rel="icon" href="icons/flower.png">

<style>

          body {
            font-family: "Crimson Pro", serif;
            margin: 0;
            min-height: 100vh;
            background: #12131b;
          }

      .da-container {
        width: min(90vw, 100%);
        height: 500px;
        padding: 20px;
        margin: 0 auto;
        background: none;
        overflow: visible;
        font-size: 20px;
        color: #a1a3b2;
        display: flex;        
        flex-direction: row;   
        gap: 15px;            
        position: relative;
        justify-content: center; 
        align-items: center;  
        flex-wrap: wrap;      
      }

        .da-container a {
        color: #aab4ff;
        text-decoration: none;
        font-weight: 200;
        font-family:  monospace ;
        font-size: 20px;
        
        }

        .da-container a:hover {
        text-decoration: underline;
        cursor: pointer;
        color: #aab4ff;
        text-shadow: 0 0 6px #aab4ff;
        transition: color 0.2s ease, text-shadow 0.2s ease;
        }


    .grid {
        column-count: 3;
        column-gap: 20px;
    }


    .synopsis {
    line-height: 1.2;
    }

    .date {
    margin-bottom: -20px;
    margin-top: -20px;
    opacity: .4;
    }

    h3 {
        font-size: 2.2em;
        text-align: left;
        line-height: 1;
        font-weight: 500;
        margin-top: -5px;
        transition: color 0.2s ease, text-shadow 0.2s ease;
    }




          body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            filter: url(#noiseFilter);
            opacity: .2;
            background:   #000;
            pointer-events: none;
          }


          body::selection {
            background: #000;
            color: #aab4ff;
          }



          ::-webkit-scrollbar {
          width: 5px;
          height: 5px;
          }

          ::-webkit-scrollbar-track {
          background: #000;
          }

          ::-webkit-scrollbar-thumb {
          background: #12131b;
          border-radius: 0px;
          }

          ::-webkit-scrollbar-thumb:hover {
          background: #12131b;
          }

          .ascii-link {
            color: inherit;          
            text-decoration: none;  
            transition: color 0.2s ease;
          }


          #popupGif{ display:none; position:absolute; position: absolute; left: .3vw; top: .88vh; width: 17.2vw;z-index:9999; }

        .da-container img {
        width: 25vw;
        height: auto;
        object-fit: cover;
        flex-shrink: 0;
      }



@media (max-width: 768px) {
  .da-container img {
    width: 100%;
  }
}
